<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Metro World</title><style>
*{box-sizing:border-box}html,body{margin:0;height:100%;overflow:hidden;background:#05060a;color:#fff;font-family:system-ui,Arial}canvas{width:100vw;height:100vh;display:block}#hud{position:fixed;top:12px;left:12px;right:12px;display:flex;justify-content:space-between;pointer-events:none}.pill{background:rgba(10,14,23,.8);border:1px solid #ffffff25;border-radius:16px;padding:10px 12px;box-shadow:0 8px 20px #0008}#title{color:#ffd166;font-weight:900}#pad{position:fixed;left:18px;bottom:24px;width:148px;height:148px}.d{position:absolute;width:52px;height:52px;border:0;border-radius:16px;background:#eee;font-size:28px;font-weight:900}#up{left:48px}#left{left:0;top:48px}#down{left:48px;top:96px}#right{left:96px;top:48px}#battle{position:fixed;inset:0;display:none;background:linear-gradient(#101827,#05070c);overflow:hidden}.card{position:absolute;background:#101827dd;border:1px solid #fff3;border-radius:18px;padding:12px;box-shadow:0 12px 28px #0008}.bar{height:12px;background:#2a3140;border-radius:99px;overflow:hidden;margin-top:8px}.hp{height:100%;width:100%;background:linear-gradient(90deg,#28e576,#c9ff4a);transition:.35s}#enemyCard{right:16px;top:70px;width:190px}#heroCard{left:16px;bottom:185px;width:190px}#bt{left:16px;right:16px;bottom:86px;min-height:72px}#moves{position:fixed;left:16px;right:16px;bottom:14px;display:grid;grid-template-columns:1fr 1fr;gap:10px}.m{border:0;border-radius:16px;padding:14px;background:#eaf0fa;color:#111;font-weight:900;font-size:15px}.lv{float:right;color:#ffd166}</style></head><body>
<canvas id="game"></canvas><div id="hud"><div class="pill" id="title">METRO WORLD</div><div class="pill">Bricklyn Ave · Tags: 3</div></div>
<div id="pad"><button class="d" id="up">↑</button><button class="d" id="left">←</button><button class="d" id="down">↓</button><button class="d" id="right">→</button></div>
<div id="battle"><canvas id="bc"></canvas><div class="card" id="enemyCard"><b id="en">Ruffrat</b><span class="lv">Lv.3</span><div class="bar"><div class="hp" id="ehp"></div></div></div><div class="card" id="heroCard"><b>Hoodie Kid</b><span class="lv">Lv.5</span><div class="bar"><div class="hp" id="hhp"></div></div></div><div class="card" id="bt">A wild beast appeared!</div><div id="moves"><button class="m" id="m1">Quick Step</button><button class="m" id="m2">Boom Clap</button><button class="m" id="m3">Spirit Tag</button><button class="m" id="m4">Run</button></div></div>
<script>
const cv=document.getElementById('game'),xv=cv.getContext('2d'),bv=document.getElementById('bc'),bx=bv.getContext('2d');let W,H,D=1,hold='',steps=0,bat=false;let p={x:260,y:340};let cam={x:0,y:0};let B={name:'Ruffrat',hp:100,ehp:100,fx:0};const names=['Ruffrat','Steamtoad','Taggoblin','Boombat'];function rs(){D=Math.min(devicePixelRatio||1,2);W=innerWidth;H=innerHeight;[cv,bv].forEach(c=>{c.width=W*D;c.height=H*D});xv.setTransform(D,0,0,D,0,0);bx.setTransform(D,0,0,D,0,0)}onresize=rs;rs();
function rr(g,x,y,w,h,r){g.beginPath();g.roundRect(x,y,w,h,r);g.fill()}function player(g,x,y,s=1){g.save();g.translate(x,y);g.scale(s,s);g.fillStyle='#0008';g.beginPath();g.ellipse(17,52,18,7,0,0,7);g.fill();g.fillStyle='#c98934';rr(g,-2,41,15,9,3);rr(g,21,41,15,9,3);g.fillStyle='#1f4a78';rr(g,4,28,10,18,4);rr(g,20,28,10,18,4);g.fillStyle='#11151d';rr(g,0,12,34,24,8);g.fillStyle='#9a5b2b';rr(g,7,3,20,18,7);g.fillStyle='#050608';rr(g,3,-4,28,10,5);g.fillRect(28,-1,11,4);g.fillStyle='#fff';g.font='bold 8px Arial';g.fillText('NY',12,4);g.fillStyle='#fff';g.fillRect(11,10,3,3);g.fillRect(22,10,3,3);g.fillStyle='#11151d';rr(g,-5,17,9,20,5);rr(g,30,17,9,20,5);g.fillStyle='#9a5b2b';rr(g,-5,34,8,7,3);rr(g,31,34,8,7,3);g.restore()}
function map(){xv.fillStyle='#0d111b';xv.fillRect(0,0,W,H);cam.x=p.x-W/2;cam.y=p.y-H/2;let sx=Math.floor(cam.x/96)*96,sy=Math.floor(cam.y/96)*96;for(let y=sy;y<cam.y+H+120;y+=96)for(let x=sx;x<cam.x+W+120;x+=96){let tx=x-cam.x,ty=y-cam.y,t=(Math.floor(x/96)*13+Math.floor(y/96)*7)%9;xv.fillStyle=t<2?'#171d2b':t<5?'#10141e':'#141823';xv.fillRect(tx,ty,96,96);xv.strokeStyle='#2a3140';xv.lineWidth=2;xv.strokeRect(tx,ty,96,96);if(t==1){xv.fillStyle='#2c3343';xv.fillRect(tx+10,ty+10,76,76)}if(t==3){xv.fillStyle='#242b34';xv.fillRect(tx+6,ty+40,84,16);xv.fillStyle='#ffd166';xv.fillRect(tx+35,ty+46,26,4)}if(t==6){xv.fillStyle='#1c3c31';xv.fillRect(tx+8,ty+8,80,80);xv.fillStyle='#2ee67c';xv.fillRect(tx+42,ty+12,12,70);xv.fillRect(tx+14,ty+42,68,12)}}xv.fillStyle='#ffd166';xv.font='bold 20px Arial';xv.fillText('BRICKLYN AVE',22,62)}
function upd(){if(hold=='left')p.x-=3;if(hold=='right')p.x+=3;if(hold=='up')p.y-=3;if(hold=='down')p.y+=3;p.x=Math.max(40,Math.min(1100,p.x));p.y=Math.max(80,Math.min(900,p.y));if(hold){steps++;if(steps%120==0&&Math.random()<.7)start()}}function loop(){if(!bat){upd();map();player(xv,p.x-cam.x,p.y-cam.y,1.25)}requestAnimationFrame(loop)}loop();
function ctl(id,v){document.getElementById(id).ontouchstart=e=>{e.preventDefault();hold=v};document.getElementById(id).ontouchend=()=>hold='';document.getElementById(id).onmousedown=()=>hold=v;document.getElementById(id).onmouseup=()=>hold=''}ctl('up','up');ctl('down','down');ctl('left','left');ctl('right','right');
function start(){bat=true;B.name=names[Math.floor(Math.random()*names.length)];B.ehp=100;B.hp=100;document.getElementById('battle').style.display='block';document.getElementById('en').textContent=B.name;text('A wild '+B.name+' stepped out from neon steam!');drawB()}function text(t){document.getElementById('bt').textContent=t}function beast(x,y){bx.save();bx.translate(x,y);bx.shadowColor='#ff3f8e';bx.shadowBlur=20;bx.fillStyle=B.fx?'#fff':(B.name=='Steamtoad'?'#34d399':B.name=='Boombat'?'#35c7ff':B.name=='Taggoblin'?'#ff3f8e':'#8d66ff');if(B.name=='Boombat'){bx.beginPath();bx.ellipse(0,28,38,24,0,0,7);bx.fill();bx.beginPath();bx.moveTo(-20,22);bx.lineTo(-70,0);bx.lineTo(-34,45);bx.fill();bx.beginPath();bx.moveTo(20,22);bx.lineTo(70,0);bx.lineTo(34,45);bx.fill()}else{bx.beginPath();bx.ellipse(0,35,48,30,0,0,7);bx.fill();bx.fillStyle='#fff';bx.fillRect(-18,26,10,10);bx.fillRect(8,26,10,10)}bx.restore();if(B.fx)B.fx--}function drawB(){if(!bat)return;bx.clearRect(0,0,W,H);bx.fillStyle='#07111f';bx.fillRect(0,0,W,H);for(let i=0;i<16;i++){bx.strokeStyle='rgba(53,199,255,.12)';bx.beginPath();bx.moveTo(0,H*.56+i*20);bx.lineTo(W,H*.35+i*9);bx.stroke()}bx.fillStyle='#ffffff18';bx.beginPath();bx.ellipse(W*.72,H*.34,95,24,0,0,7);bx.fill();bx.beginPath();bx.ellipse(W*.28,H*.68,120,30,0,0,7);bx.fill();beast(W*.72,H*.26);player(bx,W*.18,H*.57,2.2);document.getElementById('ehp').style.width=Math.max(0,B.ehp)+'%';document.getElementById('hhp').style.width=Math.max(0,B.hp)+'%';requestAnimationFrame(drawB)}
function hit(n,d){B.ehp-=d+Math.floor(Math.random()*18);B.fx=10;text('Hoodie Kid used '+n+'!');if(B.ehp<=0){text(B.name+' fainted. Respect earned.');setTimeout(end,900)}else setTimeout(()=>{B.hp-=10+Math.floor(Math.random()*15);text(B.name+' countered from the shadows!');if(B.hp<=0)setTimeout(end,900)},500)}m1.onclick=()=>hit('Quick Step',18);m2.onclick=()=>hit('Boom Clap',24);m3.onclick=()=>{if(B.ehp<50||Math.random()<.25){text(B.name+' joined your crew!');setTimeout(end,900)}else{text('The Spirit Tag shook loose!')}};m4.onclick=end;function end(){bat=false;document.getElementById('battle').style.display='none'}
</script></body></html>
